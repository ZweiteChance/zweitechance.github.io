<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // Получаем ссылку из параметра ?url=
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');
    
    // Если ссылка найдена - перенаправляем
    if (targetUrl) {
      window.location.replace(targetUrl);
    } else {
      // Если ссылки нет - просто пишем ошибку
      document.write("<p>Redirect error. No URL found.</p>");
    }
  </script>
</head>
<body style="background:#0a0a0a;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;">
  <div>
    <p style="font-size:1.2rem;margin-bottom:10px;">Wir leiten dich um...</p>
    <!-- Лоадер -->
    <div style="border:4px solid #00c853;border-top-color:transparent;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;"></div>
  </div>
  
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
